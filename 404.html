<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <link rel="stylesheet" href="tailwind-build.css?v=1.0.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | 0aftermath</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to 0aftermath's homepage to explore AI-powered marketing and automation services.">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" href="logo.png" type="image/png">
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="styles.css?v=6.0.0">
</head>

<body class="bg-white text-gray-900 antialiased">

    <div class="min-h-screen flex items-center justify-center px-6">
        <div class="text-center max-w-lg">
            <!-- Big 404 -->
            <h1 class="text-[10rem] font-display font-bold leading-none bg-gradient-to-r from-primary via-secondary to-accent text-transparent bg-clip-text">
                404
            </h1>

            <h2 class="text-2xl md:text-3xl font-display font-bold mt-4 mb-4">
                Page Not Found
            </h2>

            <p class="text-text-muted text-lg mb-10">
                The page you're looking for doesn't exist or has been moved. Let's get you back on track.
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/"
                    class="bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white px-8 py-4 rounded-full font-bold transition-all shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:scale-105">
                    Back to Homepage
                </a>
                <a href="/#contact"
                    class="border-2 border-gray-200 hover:border-primary text-text-main px-8 py-4 rounded-full font-bold transition-all hover:scale-105">
                    Contact Us
                </a>
            </div>

            <div class="mt-16 pt-8 border-t border-gray-100">
                <a href="/" class="inline-block">
                    <img src="logo.png" alt="0aftermath" class="h-12 opacity-40 hover:opacity-100 transition-opacity">
                </a>
            </div>
        </div>
    </div>

</body>

</html>
