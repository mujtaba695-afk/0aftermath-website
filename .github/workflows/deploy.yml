name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    name: Validate HTML & Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all HTML files exist
        run: |
          echo "Checking core files..."
          for f in index.html seo.html ads.html automation.html roi-calculator.html sitemap.xml styles.css script.js; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ MISSING: $f" && exit 1
            fi
          done

      - name: Check for broken internal links
        run: |
          echo "Scanning for dead href='#' placeholders..."
          # Warn about orphaned # links (social media is OK for now)
          grep -rn 'href="#"' index.html seo.html ads.html automation.html roi-calculator.html || true
          echo "Scan complete."

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (exclude dev & build files)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
